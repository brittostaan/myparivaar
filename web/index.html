<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="myparivaar">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FFFFFF">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>myparivaar</title>
  <link rel="manifest" href="manifest.json">

  <!-- Mobile Optimization CSS -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      background-color: #ffffff;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #flutter-container {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Prevent pull-to-refresh on iOS */
    body {
      overscroll-behavior: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Prevent zoom on double-tap iOS */
    input, select, textarea {
      font-size: 16px !important;
    }

    /* Hide preload-links overlay when Flutter loads */
    #preload-links {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      z-index: 1;
      transition: opacity 0.3s ease-out;
    }

    /* When Flutter app is ready, fade out splash screen */
    body.flutter-app-loaded #preload-links {
      opacity: 0;
      pointer-events: none;
    }
  </style>

  <!-- Inter font via CDN — avoids bundling ~1.3 MB of .ttf files in debug builds -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2GVN4C6HCX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2GVN4C6HCX');
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!-- Crawlable links for Google verification — visible until Flutter loads -->
  <div id="preload-links" style="text-align:center;padding:40px;font-family:sans-serif;color:#475569">
    <p style="font-size:13px">
      <a href="/privacy" style="color:#2563EB">Privacy Policy</a> &middot;
      <a href="/terms" style="color:#2563EB">Terms of Service</a>
    </p>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <!-- Mark app as loaded when Flutter is ready -->
  <script>
    window.addEventListener('flutter-app-loaded', function() {
      document.body.classList.add('flutter-app-loaded');
    });

    // Also watch for Flutter's native initialization
    if (window.flutterWebLoader) {
      window.flutterWebLoader.load();
    }
  </script>

  <!-- Fallback for JS-disabled crawlers -->
  <noscript>
    <div style="text-align:center;padding:40px;font-family:sans-serif">
      <h1>myParivaar</h1>
      <p>AI-powered family finance management for Indian households.</p>
      <p><a href="/privacy">Privacy Policy</a> | <a href="/terms">Terms of Service</a></p>
    </div>
  </noscript>
</body>
</html>
